<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Billing SaaS - History</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .history-card {
      margin-bottom: 2rem;
      padding: 1.5rem;
    }
    
    .history-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    
    .history-date {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .history-id {
      font-weight: 600;
      color: var(--accent-color);
    }
    
    .history-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .history-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--glass-highlight);
      padding: 0.75rem;
      border-radius: 8px;
    }
    
    .history-item img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
    }
    
    .history-item-details {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .history-item-name {
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .history-item-qty {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    .history-item-price {
      font-weight: 600;
      color: var(--success-color);
    }
    
    .history-footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: flex-end;
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    
    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    #history-container {
      max-width: 800px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass fade-in">
    <a href="index.html" class="nav-brand">
      <img src="" alt="Brand Logo" class="nav-logo">
      <span class="nav-brand-name">Brand Name</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Menu</a></li>
      <li><a href="history.html" class="active">History</a></li>
      <li><a href="sales.html">Total Sales</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="manage.html">Manage Items</a></li>
    </ul>
  </nav>

  <!-- Main Container -->
  <main class="container fade-in" id="history-container">
    <h2 class="section-title">📜 Order History</h2>
    <div id="history-list">
      <!-- Rendered via JS -->
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
