<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Billing SaaS - Profile</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .profile-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    label {
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.2);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: var(--transition);
    }
    
    input[type="text"]:focus, input[type="url"]:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    
    .logo-preview-box {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      border: 1px dashed var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-top: 0.5rem;
      background: rgba(0,0,0,0.2);
    }
    
    .logo-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass fade-in">
    <a href="index.html" class="nav-brand">
      <img src="" alt="Brand Logo" class="nav-logo">
      <span class="nav-brand-name">Brand Name</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Menu</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="sales.html">Total Sales</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
      <li><a href="manage.html">Manage Items</a></li>
    </ul>
  </nav>

  <!-- Main Container -->
  <main class="container fade-in">
    
    <div class="profile-container glass">
      <h2 class="section-title" style="margin-bottom:0.5rem;">⚙️ Store Settings</h2>
      <p style="color:var(--text-secondary); margin-bottom:1rem;">Customize your POS dashboard branding.</p>
      
      <div class="form-group">
        <label for="brandName">Brand Name</label>
        <input type="text" id="brandName" placeholder="e.g. Mocha Cafe">
      </div>
      
      <div class="form-group">
        <label for="brandLogo">Brand Logo (URL or Upload Image)</label>
        <input type="url" id="brandLogo" placeholder="https://example.com/logo.jpg" oninput="updatePreview()">
        <input type="file" id="brandLogoFile" accept="image/*" style="margin-top: 0.5rem; color: var(--text-secondary); background: transparent; border: none; padding: 0;" onchange="handleFileUpload(event)">
        <div class="logo-preview-box">
          <img id="logoPreview" src="" alt="Preview">
        </div>
      </div>
      
      <button class="btn btn-primary" style="margin-top:1rem;" onclick="saveSettings()">Save Changes</button>
    </div>

  </main>

  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
