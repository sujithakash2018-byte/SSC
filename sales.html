<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Billing SaaS - Total Sales</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* Dashboard specific styles */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .filter-group {
      display: flex;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.5rem;
      border-radius: 8px;
    }
    
    .filter-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .filter-btn.active, .filter-btn:hover {
      background: var(--accent-color);
      color: white;
    }
    
    .current-date-label {
      font-size: 1.1rem;
      color: var(--text-primary);
      font-weight: 600;
      background: var(--glass-highlight);
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .summary-card {
      padding: 1.5rem;
      text-align: center;
    }
    
    .summary-card h3 {
      font-size: 1.1rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    
    .summary-card p {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--accent-color);
      margin: 0;
    }
    
    .chart-section {
      margin-bottom: 3rem;
      padding: 1.5rem;
      border-radius: 12px;
    }
    
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .chart-header h3 {
        margin: 0;
    }
    
    .search-bar-container {
      display: flex;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    
    .search-bar-container:focus-within {
      border-color: var(--accent-color);
    }
    
    .search-input {
      background: transparent;
      border: none;
      color: white;
      padding: 0.6rem 1rem;
      outline: none;
      min-width: 250px;
    }
    
    .search-input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    
    .search-btn {
      background: var(--accent-color);
      border: none;
      color: white;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-weight: 600;
    }
    
    .search-btn:hover {
      background: #2563eb;
    }
    
    .reset-search-btn {
      background: transparent;
      border: none;
      color: var(--danger-color);
      padding: 0.6rem 1rem;
      cursor: pointer;
      display: none;
    }
    
    .reset-search-btn.active {
      display: block;
    }

    .chart-container {
      position: relative;
      height: 400px;
      width: 100%;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar glass fade-in">
    <a href="index.html" class="nav-brand">
      <img src="" alt="Brand Logo" class="nav-logo" id="nav-logo" onerror="this.style.display='none'">
      <span class="nav-brand-name" id="nav-brand-name">Smart Billing</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Menu</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="sales.html" class="active">Total Sales</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="manage.html">Manage Items</a></li>
    </ul>
  </nav>

  <!-- Main Container -->
  <main class="container fade-in">
    <div class="dashboard-header">
      <h2 class="section-title" style="margin-bottom: 0;">📊 Sales Analytics</h2>
      
      <div id="date-label" class="current-date-label">
        <span id="date-icon">📅</span> 
        <span id="date-text">Loading...</span>
      </div>
      
      <div class="filter-group">
        <button class="filter-btn active" data-period="daily">Daily</button>
        <button class="filter-btn" data-period="weekly">Weekly</button>
        <button class="filter-btn" data-period="monthly">Monthly</button>
        <button class="filter-btn" data-period="yearly">Yearly</button>
      </div>

        <!-- sales.html -->
      <!--<div style="margin-top: 1rem;">
         <button onclick="sendToAI({ summary: 'Test data' })" class="btn btn-primary">
            🤖 Get AI Insights
         </button>
      </div>-->

<script src="js/sales.js"></script>

        

    </div>
    
    <div id="dashboard-content">
      <div class="summary-cards">
        <div class="summary-card glass">
          <h3>Total Revenue</h3>
          <p id="total-revenue-val">₹0</p>
        </div>
        <div class="summary-card glass">
          <h3>Items Sold</h3>
          <p id="total-items-val">0</p>
        </div>
      </div>
      
      <div class="chart-section glass" id="revenue-chart-section">
        <div class="chart-header">
          <h3>Revenue Trend</h3>
        </div>
        <div class="chart-container">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>
      
      <div class="chart-section glass" id="item-chart-section">
        <div class="chart-header">
          <h3>Item Sales Grades</h3>
          <div class="search-bar-container">
            <input type="text" id="item-search-input" class="search-input" placeholder="Search specific item...">
            <button id="reset-search-btn" class="reset-search-btn">&times;</button>
            <button id="item-search-btn" class="search-btn">Search </button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="itemGradesChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sales.js"></script>
</body>
</html>
